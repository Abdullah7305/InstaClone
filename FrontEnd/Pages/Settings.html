<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Instaclone</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white font-sans flex justify-center items-start min-h-screen pt-10">

    <div class="w-full max-w-md px-4">
        <div class="flex items-center gap-4 mb-8">
            <a class="hover:opacity-70 transition-opacity">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                </svg>
            </a>
            <a href="Home.html" class="text-xl font-bold">Settings</a>
        </div>

        <div class="bg-[#121212] border border-[#262626] rounded-xl overflow-hidden">

            <div class="p-5 flex items-center justify-between border-b border-[#262626]">
                <div class="pr-4">
                    <h3 class="text-sm font-semibold mb-1">Private Account</h3>
                    <p class="text-xs text-gray-400 leading-relaxed">
                        Only people you approve can see your photos and videos.
                    </p>
                </div>

                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="privacy-toggle" class="sr-only peer">
                    <div
                        class="w-11 h-6 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600">
                    </div>
                </label>
            </div>

            <div class="p-2">
                <button id="logout-btn"
                    class="w-full text-left p-3 text-red-500 font-medium text-sm hover:bg-white/5 rounded-lg transition-colors flex items-center justify-between group">
                    <span>Log Out</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="group-hover:translate-x-1 transition-transform"
                        width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </button>
            </div>

        </div>

        <p id="username" class="mt-6 text-center text-[10px] text-gray-500 uppercase tracking-widest">
            Logged in as @username
        </p>
    </div>
    <script src="../applogic/Settings.js"></script>
</body>

</html>

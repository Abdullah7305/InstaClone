<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instaclone — Messages</title>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #161616;
            --card: #1c1c1c;
            --hover: #222;
            --border: #2e2e2e;
            --accent: #e1306c;
            --accent2: #f77737;
            --txt: #f0f0f0;
            --muted: #686868;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--txt);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* LOGO */
        .logo {
            font-family: 'Pacifico', cursive;
            background: linear-gradient(90deg, #f09433, #e6683c, #dc2743, #cc2366);

            /* Standard property */
            background-clip: text;

            /* WebKit support */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            /* Fallback */
            color: transparent;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 18px;
            border-bottom: 1px solid var(--border);
        }

        .user-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
        }

        /* Body clean style */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #fafafa;
            display: flex;
            justify-content: center;
        }

        /* Chat list container */
        #user-list {
            width: 360px;
            margin-top: 20px;
        }

        /* Button style like Instagram */
        .user-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366);
            border: none;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .user-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            margin-right: 12px;
            border: 2px solid #fff;
            object-fit: cover;
        }

        .user-item-name {
            font-weight: 600;
            font-size: 14px;
        }

        .user-item-sub {
            font-size: 12px;
            opacity: 0.8;
        }

        .user-item:hover {
            background: var(--hover);
        }

        .user-item.active {
            background: var(--hover);
            border-left: 2px solid var(--accent);
        }

        .user-item img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .user-item-name {
            font-weight: 600;
        }

        .user-item-sub {
            font-size: 12px;
            color: var(--muted);
        }

        /* CHAT PANEL */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* TOP BAR */
        .chat-topbar {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .chat-topbar img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }

        /* MESSAGES */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            text-align: center;
        }

        .msg-row {
            display: flex;
        }

        /* ✅ Sender RIGHT */
        .msg-row.sent {
            justify-content: flex-end;
        }

        /* ✅ Receiver LEFT */
        .msg-row.received {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 60%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
        }

        /* Sender */
        .msg-row.sent .bubble {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        /* Receiver */
        .msg-row.received .bubble {
            background: var(--card);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* INPUT */
        .input-bar {
            display: flex;
            padding: 12px;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }

        .msg-input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card);
            color: white;
        }

        .send-btn {
            margin-left: 10px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="Home.html" style="list-style: none; text-decoration: none;" class="logo">Instaclone</a>
            <p style="font-weight:700;">Messages</p>
        </div>

        <div id="user-list">



        </div>
    </aside>

    <!-- CHAT -->
    <div class="chat-panel">

        <div class="chat-topbar" id="chat-topbar">
            <img id="chat-avatar">
            <span id="chat-name"></span>
        </div>

        <div class="messages-area" id="messages-area">
            <div class="empty-state">
                <p>No chat selected</p>
                <p style="font-size:12px;">Select a user to start messaging</p>
            </div>
        </div>

        <div class="input-bar">
            <input id="msg-input" class="msg-input" placeholder="Message..."
                onkeydown="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>

    </div>


    <script src="../applogic/Messages.js"></script>
</body>

</html>
